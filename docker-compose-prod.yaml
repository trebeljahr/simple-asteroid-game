services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: ghcr.io/trebeljahr/asteroid-game-server:main
    pull_policy: always
    restart: unless-stopped
    environment:
      PORT: "9777"
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  client:
    image: ghcr.io/trebeljahr/asteroid-game-client:main
    pull_policy: always
    restart: unless-stopped
    environment:
      PORT: "80"
      BACKEND_URL: http://server:9777
    depends_on:
      server:
        condition: service_healthy
