services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-asteroids}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-asteroids}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-asteroids} -d ${POSTGRES_DB:-asteroids}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    image: ghcr.io/trebeljahr/asteroid-game-server:main
    pull_policy: always
    restart: unless-stopped
    environment:
      PORT: "9777"
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      DATABASE_URL: "postgres://${POSTGRES_USER:-asteroids}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-asteroids}"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  client:
    image: ghcr.io/trebeljahr/asteroid-game-client:main
    pull_policy: always
    restart: unless-stopped
    environment:
      PORT: "80"
      BACKEND_URL: http://server:9777
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres-data:
