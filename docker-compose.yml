services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-9777}:9777"
    environment:
      PORT: "9777"
      NODE_ENV: "${NODE_ENV:-production}"
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:80"
    environment:
      PORT: "80"
      BACKEND_URL: http://server:9777
    depends_on:
      server:
        condition: service_healthy
