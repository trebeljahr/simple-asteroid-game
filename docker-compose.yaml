services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-asteroids}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-asteroids_dev_password}"
      POSTGRES_DB: "${POSTGRES_DB:-asteroids}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-asteroids} -d ${POSTGRES_DB:-asteroids}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-9777}:9777"
    environment:
      PORT: "9777"
      NODE_ENV: "${NODE_ENV:-production}"
      REDIS_URL: redis://redis:6379
      DATABASE_URL: "postgres://${POSTGRES_USER:-asteroids}:${POSTGRES_PASSWORD:-asteroids_dev_password}@postgres:5432/${POSTGRES_DB:-asteroids}"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:80"
    environment:
      PORT: "80"
      BACKEND_URL: http://server:9777
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres-data:
