<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#060f1f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Asteroids" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <title>Asteroids</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #010611;
      }

      body.app-loading .backgroundImage,
      body.app-loading canvas {
        opacity: 0;
      }

      body.app-ready #app-shell {
        opacity: 0;
        pointer-events: none;
      }

      .backgroundImage {
        display: block;
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: none;
        object-fit: cover;
        opacity: 1;
        transition: opacity 220ms ease;
      }

      #app-shell {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 22% 18%, rgba(92, 149, 193, 0.2), transparent 28%),
          radial-gradient(circle at 76% 22%, rgba(255, 177, 94, 0.12), transparent 20%),
          linear-gradient(180deg, #07111f, #040912 56%, #02050c);
        transition: opacity 260ms ease;
      }

      #app-shell::before {
        content: "";
        position: absolute;
        width: min(42vw, 28rem);
        height: min(42vw, 28rem);
        border-radius: 50%;
        border: 1px solid rgba(124, 205, 245, 0.12);
        box-shadow:
          0 0 0 2.2rem rgba(99, 170, 214, 0.03),
          0 0 0 6rem rgba(99, 170, 214, 0.02);
        animation: appShellHalo 2.8s ease-in-out infinite;
      }

      .appShellFrame {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.9rem;
      }

      .appShellMark {
        width: min(5.5rem, 20vw);
        height: auto;
        border-radius: 1.45rem;
        box-shadow:
          0 1.2rem 2.6rem rgba(0, 0, 0, 0.35),
          0 0 0 1px rgba(136, 208, 244, 0.12);
      }

      .appShellBadge {
        position: relative;
        padding: 1rem 1.4rem;
        border: 1px solid rgba(136, 208, 244, 0.28);
        border-radius: 0.9rem;
        color: rgba(227, 241, 248, 0.94);
        font:
          700 0.9rem/1 "Trebuchet MS",
          "Segoe UI",
          sans-serif;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        background: linear-gradient(180deg, rgba(11, 23, 39, 0.82), rgba(7, 15, 29, 0.7));
        box-shadow:
          0 1rem 2rem rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .appShellStatus {
        width: min(18rem, 48vw);
        height: 0.26rem;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(124, 205, 245, 0.1);
        box-shadow: inset 0 0 0 1px rgba(124, 205, 245, 0.08);
      }

      .appShellStatus::after {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(124, 205, 245, 0), rgba(124, 205, 245, 0.9), rgba(255, 177, 94, 0));
        animation: appShellSweep 1.4s ease-in-out infinite;
      }

      @keyframes appShellHalo {
        0%,
        100% {
          transform: scale(0.98);
          opacity: 0.72;
        }

        50% {
          transform: scale(1.04);
          opacity: 1;
        }
      }

      @keyframes appShellSweep {
        0% {
          transform: translateX(-125%);
        }

        100% {
          transform: translateX(340%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-shell::before,
        .appShellStatus::after {
          animation: none;
        }
      }
    </style>
  </head>
  <body class="app-loading">
    <div id="app-shell" aria-hidden="true">
      <div class="appShellFrame">
        <img
          src="/assets/null-vector-thumbnail.svg"
          class="appShellMark"
          alt=""
        />
        <div class="appShellBadge">Asteroids</div>
        <div class="appShellStatus"></div>
      </div>
    </div>
    <img
      src="/assets/background.jpg"
      class="backgroundImage"
      alt="galaxy background"
    />
    <div id="menu" class="menuRoot"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
