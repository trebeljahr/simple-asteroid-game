<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="spaceBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1028"/>
      <stop offset="1" stop-color="#2a1a44"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#4DC7FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#4DC7FF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="innerClip">
      <rect x="30" y="30" width="452" height="452" rx="98"/>
    </clipPath>
  </defs>
  <!-- Outer frame -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#1C1510"/>
  <!-- Inner space backdrop -->
  <rect x="30" y="30" width="452" height="452" rx="98" fill="url(#spaceBg)"/>
  <rect x="30" y="30" width="452" height="452" rx="98" fill="url(#centerGlow)"/>
  <g clip-path="url(#innerClip)">
    <!-- Starfield -->
    <circle cx="90" cy="110" r="3" fill="#ffffff" opacity="0.85"/>
    <circle cx="140" cy="78" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="70" cy="220" r="2" fill="#ffffff" opacity="0.75"/>
    <circle cx="105" cy="340" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="65" cy="420" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="130" cy="460" r="3" fill="#ffffff" opacity="0.9"/>
    <circle cx="420" cy="110" r="3" fill="#ffffff" opacity="0.9"/>
    <circle cx="380" cy="78" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="450" cy="190" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="410" cy="360" r="3" fill="#ffffff" opacity="0.85"/>
    <circle cx="440" cy="440" r="2" fill="#ffffff" opacity="0.75"/>
    <circle cx="370" cy="470" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="80" cy="160" r="1.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="430" cy="280" r="1.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="55" cy="300" r="1.5" fill="#ffffff" opacity="0.55"/>
    <circle cx="460" cy="330" r="1.5" fill="#ffffff" opacity="0.55"/>
    <!-- Ship: centred in the 512 canvas, rotated, nose up-left -->
    <g transform="translate(256 256) rotate(-30) translate(-100 -200)">
      <image x="0" y="0" width="200" height="400"
             href="data:image/svg+xml;base64,"/>
    </g>
  </g>
</svg>
